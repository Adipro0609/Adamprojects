<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sound Buttons Game</title>
    <style>
        body { display: flex; flex-wrap: wrap; justify-content: center; }
        button { margin: 10px; padding: 20px; font-size: 16px; }
    </style>
</head>
<body>
    <script>
        const sounds = [
            'sound1.mp3', 'sound2.mp3', 'sound3.mp3', 'sound4.mp3', 'sound5.mp3',
            // Add more sound files up to your requirement
        ];

        function playSound(index) {
            const audio = new Audio(sounds[index]);
            audio.play();
        }

        function createButtons() {
            for (let i = 0; i < 100; i++) {
                const button = document.createElement('button');
                button.textContent = 'Sound ' + (i + 1);
                button.onclick = () => playSound(i % sounds.length);
                document.body.appendChild(button);
            }
        }

        window.onload = createButtons;
    </script>
</body>
</html>
